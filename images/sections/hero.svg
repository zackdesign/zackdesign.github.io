<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="presentation">
  <defs>
    <!-- Fade to transparent at edges so content stays readable -->
    <radialGradient id="fade" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <mask id="fade-mask">
      <rect width="1920" height="1080" fill="url(#fade)"/>
    </mask>

    <!-- Fine dot grid -->
    <pattern id="dotGrid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1" fill="#8B9BFF" fill-opacity="0.55"/>
    </pattern>

    <!-- Hex outline tile -->
    <pattern id="hexTile" x="0" y="0" width="240" height="208" patternUnits="userSpaceOnUse">
      <path d="M120 4 L228 68 L228 196 L120 260 L12 196 L12 68 Z"
            fill="none" stroke="#4361EE" stroke-opacity="0.12" stroke-width="1"/>
      <path d="M228 68 L336 132 L336 260 L228 324 L120 260 L120 132 Z"
            fill="none" stroke="#22D3EE" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <!-- Connecting-line field -->
    <pattern id="linesPattern" x="0" y="0" width="640" height="640" patternUnits="userSpaceOnUse">
      <line x1="0" y1="320" x2="640" y2="320" stroke="#4361EE" stroke-opacity="0.05" stroke-width="1"/>
      <line x1="320" y1="0" x2="320" y2="640" stroke="#22D3EE" stroke-opacity="0.04" stroke-width="1"/>
      <line x1="0" y1="0" x2="640" y2="640" stroke="#4361EE" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- All geometry masked by radial fade -->
  <g mask="url(#fade-mask)">
    <rect width="1920" height="1080" fill="url(#linesPattern)"/>
    <rect width="1920" height="1080" fill="url(#hexTile)"/>
    <rect width="1920" height="1080" fill="url(#dotGrid)"/>

    <!-- Accent node glyphs scattered -->
    <g fill="#22D3EE" fill-opacity="0.5">
      <circle cx="360" cy="220" r="3"/>
      <circle cx="1540" cy="180" r="3"/>
      <circle cx="280" cy="820" r="3"/>
      <circle cx="1680" cy="880" r="3"/>
      <circle cx="960" cy="540" r="4"/>
    </g>
    <g fill="#4361EE" fill-opacity="0.55">
      <circle cx="720" cy="380" r="2.5"/>
      <circle cx="1200" cy="300" r="2.5"/>
      <circle cx="640" cy="760" r="2.5"/>
      <circle cx="1320" cy="720" r="2.5"/>
    </g>

    <!-- Accent connecting rays -->
    <g stroke-width="1" fill="none" stroke-linecap="round">
      <path d="M360 220 L720 380 L1200 300" stroke="#4361EE" stroke-opacity="0.18"/>
      <path d="M280 820 L640 760 L960 540 L1320 720 L1680 880" stroke="#22D3EE" stroke-opacity="0.14"/>
      <path d="M960 540 L1200 300" stroke="#22D3EE" stroke-opacity="0.12"/>
      <path d="M960 540 L720 380" stroke="#4361EE" stroke-opacity="0.12"/>
    </g>

    <!-- Central halo ring -->
    <circle cx="960" cy="540" r="240" fill="none" stroke="#4361EE" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="960" cy="540" r="360" fill="none" stroke="#22D3EE" stroke-opacity="0.05" stroke-width="1"/>
    <circle cx="960" cy="540" r="480" fill="none" stroke="#4361EE" stroke-opacity="0.04" stroke-width="1"/>
  </g>
</svg>
