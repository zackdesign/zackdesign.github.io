<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="/js/parallax.js" defer></script>

{%- comment -%}
  Global ProfessionalService schema — emitted on every page.
  Per-post BlogPosting + BreadcrumbList are rendered inside the post layout.
{%- endcomment -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": {{ site.name | jsonify }},
  "description": {{ site.description | jsonify }},
  "url": "{{ site.url }}",
  "logo": "{{ site.logo | absolute_url }}",
  "image": "{{ site.image | absolute_url }}",
  "email": "isaac@zackdesign.biz",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Melbourne",
    "addressRegion": "VIC",
    "addressCountry": "AU"
  },
  "priceRange": "$$",
  "openingHoursSpecification": {
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
    "opens": "09:00",
    "closes": "17:00"
  },
  "hasOfferCatalog": {
    "@type": "OfferCatalog",
    "name": "Software Engineering Services",
    "itemListElement": [
      { "@type": "Offer", "name": "Software Engineering", "description": "Full-stack development with modern engineering practices and scalable architecture design" },
      { "@type": "Offer", "name": "Web Development", "description": "High-performance web applications built with React, TypeScript, and Node.js" },
      { "@type": "Offer", "name": "App Development", "description": "Native and cross-platform mobile applications built with React Native" },
      { "@type": "Offer", "name": "Cloud Solutions", "description": "Modern cloud architecture with serverless technologies and microservices" },
      { "@type": "Offer", "name": "AI Integration", "description": "Implementing AI-powered features, vector search, and RAG systems" },
      { "@type": "Offer", "name": "Technical Consulting", "description": "Strategic guidance and engineering team leadership" }
    ]
  }
}
</script>
