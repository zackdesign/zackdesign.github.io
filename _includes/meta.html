<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- Mobile app & status bar -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="{{ site.name }}">

<!-- SEO keywords (legacy; search engines largely ignore) -->
<meta name="keywords" content="software engineering, web development, React, TypeScript, Node.js, app development, React Native, cloud solutions, AI integration, SaaS, Melbourne, Australia">

<!-- jekyll-seo-tag emits canonical, og, twitter card, basic JSON-LD -->
{% seo %}

<!-- jekyll-feed emits <link rel="alternate"> so browsers/readers can auto-discover the Atom feed -->
{% feed_meta %}
