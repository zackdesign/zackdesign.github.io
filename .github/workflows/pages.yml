name: Build and deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # jekyll_picture_tag needs libvips to generate responsive image variants
      - name: Install libvips
        run: sudo apt-get update -q && sudo apt-get install -yq --no-install-recommends libvips-tools

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: actions/configure-pages@v6

      - name: Build site
        run: bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
